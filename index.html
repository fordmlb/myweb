<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #00d4aa;
      --accent2: #ff6b6b;
      --accent3: #ffd166;
      --text: #e6edf3;
      --muted: #8b949e;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Sarabun', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,107,107,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header .label {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* Unit toggle */
    .unit-toggle {
      display: flex;
      background: #0d1117;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .unit-toggle button {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s;
    }

    .unit-toggle button.active {
      background: var(--accent);
      color: #0d1117;
    }

    /* Input group */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .input-group label span {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0;
      text-transform: none;
      font-weight: 400;
    }

    .slider-wrapper {
      position: relative;
    }

    .slider-value {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 10px;
    }

    .slider-value small {
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      color: var(--muted);
      font-weight: 400;
      margin-left: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0,212,170,0.5);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(0,212,170,0.8);
    }

    .slider-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .number-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 18px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s;
      margin-top: 8px;
      text-align: center;
    }

    .number-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* Calculate button */
    .btn-calc {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn-calc::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-calc:hover::after { opacity: 1; }
    .btn-calc:active { transform: scale(0.98); }

    /* Result */
    .result {
      display: none;
      margin-top: 24px;
      animation: fadeUp 0.4s ease;
    }

    .result.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .bmi-number {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      transition: color 0.4s;
    }

    .bmi-label {
      font-size: 18px;
      font-weight: 700;
      margin-top: 6px;
      transition: color 0.4s;
    }

    .bmi-desc {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    /* BMI scale bar */
    .scale-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin: 20px 0 8px;
      gap: 2px;
    }

    .scale-bar div {
      flex: 1;
      border-radius: 4px;
      opacity: 0.4;
      transition: opacity 0.4s, flex 0.4s;
    }

    .scale-bar div.active {
      opacity: 1;
      flex: 2;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
    }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .info-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: left;
    }

    .info-item .info-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .info-item .info-val {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="label">Health Tracker</span>
    <h1>BMI</h1>
    <p>ดัชนีมวลกาย — Body Mass Index</p>
  </div>

  <div class="card">
    <!-- Unit toggle -->
    <div class="unit-toggle">
      <button class="active" onclick="setUnit('metric')">เมตริก (กก / ซม)</button>
      <button onclick="setUnit('imperial')">อิมพีเรียล (ปอนด์ / ฟุต)</button>
    </div>

    <!-- Weight -->
    <div class="input-group">
      <label>น้ำหนัก <span id="weightUnit">กิโลกรัม (kg)</span></label>
      <div class="slider-wrapper">
        <div class="slider-value"><span id="weightVal">70</span><small id="wUnit">kg</small></div>
        <input type="range" id="weightSlider" min="30" max="200" value="70" step="0.5" oninput="syncWeight(this.value)"/>
        <div class="slider-ticks"><span id="wMin">30</span><span id="wMax">200</span></div>
      </div>
      <input type="number" class="number-input" id="weightInput" value="70" placeholder="ใส่น้ำหนัก" oninput="syncWeightInput(this.value)"/>
    </div>

    <div class="divider"></div>

    <!-- Height -->
    <div class="input-group">
      <label>ส่วนสูง <span id="heightUnit">เซนติเมตร (cm)</span></label>
      <div class="slider-wrapper">
        <div class="slider-value"><span id="heightVal">170</span><small id="hUnit">cm</small></div>
        <input type="range" id="heightSlider" min="100" max="220" value="170" step="0.5" oninput="syncHeight(this.value)"/>
        <div class="slider-ticks"><span id="hMin">100</span><span id="hMax">220</span></div>
      </div>
      <input type="number" class="number-input" id="heightInput" value="170" placeholder="ใส่ส่วนสูง" oninput="syncHeightInput(this.value)"/>
    </div>

    <button class="btn-calc" onclick="calculate()">คำนวณ BMI ▶</button>

    <!-- Result -->
    <div class="result" id="result">
      <div class="result-card">
        <div class="bmi-number" id="bmiNum">—</div>
        <div class="bmi-label" id="bmiLabel">—</div>
        <div class="bmi-desc" id="bmiDesc">—</div>

        <div class="scale-bar" id="scaleBar">
          <div style="background:#4fc3f7" id="s1"></div>
          <div style="background:#00d4aa" id="s2"></div>
          <div style="background:#ffd166" id="s3"></div>
          <div style="background:#ff9a3c" id="s4"></div>
          <div style="background:#ff6b6b" id="s5"></div>
        </div>
        <div class="scale-labels">
          <span>ผอม</span><span>ปกติ</span><span>น้ำหนักเกิน</span><span>อ้วน</span><span>อ้วนมาก</span>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">น้ำหนักที่เหมาะสม</div>
            <div class="info-val" id="idealWeight">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">ต้องลด / เพิ่ม</div>
            <div class="info-val" id="weightDiff">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let unit = 'metric';

  function setUnit(u) {
    unit = u;
    const btns = document.querySelectorAll('.unit-toggle button');
    btns[0].classList.toggle('active', u === 'metric');
    btns[1].classList.toggle('active', u === 'imperial');

    if (u === 'metric') {
      document.getElementById('weightUnit').textContent = 'กิโลกรัม (kg)';
      document.getElementById('heightUnit').textContent = 'เซนติเมตร (cm)';
      document.getElementById('wUnit').textContent = 'kg';
      document.getElementById('hUnit').textContent = 'cm';
      document.getElementById('weightSlider').min = 30;
      document.getElementById('weightSlider').max = 200;
      document.getElementById('weightSlider').value = 70;
      document.getElementById('weightInput').value = 70;
      document.getElementById('weightVal').textContent = 70;
      document.getElementById('heightSlider').min = 100;
      document.getElementById('heightSlider').max = 220;
      document.getElementById('heightSlider').value = 170;
      document.getElementById('heightInput').value = 170;
      document.getElementById('heightVal').textContent = 170;
      document.getElementById('wMin').textContent = 30;
      document.getElementById('wMax').textContent = 200;
      document.getElementById('hMin').textContent = 100;
      document.getElementById('hMax').textContent = 220;
    } else {
      document.getElementById('weightUnit').textContent = 'ปอนด์ (lbs)';
      document.getElementById('heightUnit').textContent = 'นิ้ว (in)';
      document.getElementById('wUnit').textContent = 'lbs';
      document.getElementById('hUnit').textContent = 'in';
      document.getElementById('weightSlider').min = 66;
      document.getElementById('weightSlider').max = 440;
      document.getElementById('weightSlider').value = 154;
      document.getElementById('weightInput').value = 154;
      document.getElementById('weightVal').textContent = 154;
      document.getElementById('heightSlider').min = 39;
      document.getElementById('heightSlider').max = 87;
      document.getElementById('heightSlider').value = 67;
      document.getElementById('heightInput').value = 67;
      document.getElementById('heightVal').textContent = 67;
      document.getElementById('wMin').textContent = 66;
      document.getElementById('wMax').textContent = 440;
      document.getElementById('hMin').textContent = 39;
      document.getElementById('hMax').textContent = 87;
    }

    document.getElementById('result').classList.remove('show');
  }

  function syncWeight(v) {
    document.getElementById('weightVal').textContent = v;
    document.getElementById('weightInput').value = v;
  }
  function syncWeightInput(v) {
    document.getElementById('weightVal').textContent = v;
    document.getElementById('weightSlider').value = v;
  }
  function syncHeight(v) {
    document.getElementById('heightVal').textContent = v;
    document.getElementById('heightInput').value = v;
  }
  function syncHeightInput(v) {
    document.getElementById('heightVal').textContent = v;
    document.getElementById('heightSlider').value = v;
  }

  function calculate() {
    let w = parseFloat(document.getElementById('weightInput').value);
    let h = parseFloat(document.getElementById('heightInput').value);

    if (!w || !h || w <= 0 || h <= 0) return;

    let weightKg = w, heightCm = h;
    if (unit === 'imperial') {
      weightKg = w * 0.453592;
      heightCm = h * 2.54;
    }

    const heightM = heightCm / 100;
    const bmi = weightKg / (heightM * heightM);
    const bmiRound = Math.round(bmi * 10) / 10;

    let label, color, desc, seg;
    if (bmi < 18.5) {
      label = 'น้ำหนักต่ำกว่าเกณฑ์'; color = '#4fc3f7'; desc = 'BMI < 18.5 — ควรเพิ่มน้ำหนักให้อยู่ในเกณฑ์ที่เหมาะสม'; seg = 1;
    } else if (bmi < 23) {
      label = 'น้ำหนักปกติ ✓'; color = '#00d4aa'; desc = 'BMI 18.5–22.9 — สุขภาพดี น้ำหนักอยู่ในเกณฑ์เหมาะสม'; seg = 2;
    } else if (bmi < 25) {
      label = 'น้ำหนักเกินเล็กน้อย'; color = '#ffd166'; desc = 'BMI 23–24.9 — ควรดูแลโภชนาการและออกกำลังกาย'; seg = 3;
    } else if (bmi < 30) {
      label = 'อ้วน (โรคอ้วนระดับ 1)'; color = '#ff9a3c'; desc = 'BMI 25–29.9 — ความเสี่ยงสุขภาพเพิ่มขึ้น ควรปรึกษาแพทย์'; seg = 4;
    } else {
      label = 'อ้วนมาก (โรคอ้วนระดับ 2+)'; color = '#ff6b6b'; desc = 'BMI ≥ 30 — ความเสี่ยงสูง ควรปรึกษาแพทย์โดยด่วน'; seg = 5;
    }

    document.getElementById('bmiNum').textContent = bmiRound;
    document.getElementById('bmiNum').style.color = color;
    document.getElementById('bmiLabel').textContent = label;
    document.getElementById('bmiLabel').style.color = color;
    document.getElementById('bmiDesc').textContent = desc;

    for (let i = 1; i <= 5; i++) {
      document.getElementById('s' + i).classList.toggle('active', i === seg);
    }

    // Ideal weight range (BMI 18.5–22.9)
    const idealMin = Math.round(18.5 * heightM * heightM * 10) / 10;
    const idealMax = Math.round(22.9 * heightM * heightM * 10) / 10;

    // diff = 0 if already in range, negative = need to lose, positive = need to gain
    let diffKg = 0;
    if (weightKg > idealMax) diffKg = Math.round((weightKg - idealMax) * 10) / 10;
    else if (weightKg < idealMin) diffKg = Math.round((weightKg - idealMin) * 10) / 10;

    if (unit === 'imperial') {
      const idealMinLbs = Math.round(idealMin / 0.453592 * 10) / 10;
      const idealMaxLbs = Math.round(idealMax / 0.453592 * 10) / 10;
      document.getElementById('idealWeight').textContent = `${idealMinLbs}–${idealMaxLbs} lbs`;
      const diffLbs = Math.round(diffKg / 0.453592 * 10) / 10;
      document.getElementById('weightDiff').textContent =
        diffLbs === 0 ? 'อยู่ในเกณฑ์ ✓' :
        diffLbs > 0 ? `ลด ${diffLbs} lbs` : `เพิ่ม ${Math.abs(diffLbs)} lbs`;
    } else {
      document.getElementById('idealWeight').textContent = `${idealMin}–${idealMax} kg`;
      document.getElementById('weightDiff').textContent =
        diffKg === 0 ? 'อยู่ในเกณฑ์ ✓' :
        diffKg > 0 ? `ลด ${diffKg} kg` : `เพิ่ม ${Math.abs(diffKg)} kg`;
    }

    document.getElementById('result').classList.add('show');
  }
</script>
</body>
</html>
